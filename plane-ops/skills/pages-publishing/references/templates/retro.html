<!--
  Rendering rules (see pages-publishing SKILL.md "List Rendering Gotchas"):
  1. Empty list data: do NOT substitute empty string or <li></li> into a <ul>/<ol>.
     Substitute a single <li><em>None</em></li> OR remove the whole list block.
  2. No <li> may start with a nested <ul>/<ol>. Always leading text first.
  3. No data-checked or custom data-* attributes. Use ✅/⏳/⬜ Unicode markers.
  4. No mixed text + <p> inside a single <li>. Use <br> for multi-line bullets.
-->
